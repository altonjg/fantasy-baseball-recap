name: Draft Day — Auto-fetch picks & generate recap

on:
  schedule:
    # Poll every 30 minutes, Mar 22–24 (draft day + buffer), 13:00–03:00 UTC
    - cron: "0,30 13-23 22-24 3 *"
    - cron: "0,30 0-3  23-25 3 *"
  workflow_dispatch:
    inputs:
      season:
        description: "Season year (default: 2026)"
        required: false
        default: "2026"
      force:
        description: "Force regenerate recap even if it already exists"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  draft-picks:
    name: Fetch picks & generate recap
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Check if draft already processed
        id: check
        run: |
          SEASON="${{ github.event.inputs.season || '2026' }}"
          FORCE="${{ github.event.inputs.force }}"
          RESULTS="data/${SEASON}/draft_results.json"
          if [ "$FORCE" = "true" ]; then
            echo "already_done=false" >> $GITHUB_OUTPUT
            echo "Force flag set — regenerating recap for $SEASON."
          elif [ -f "$RESULTS" ] && python3 -c "
          import json, sys
          d = json.load(open('$RESULTS'))
          picks = d.get('picks', d) if isinstance(d, dict) else d
          sys.exit(0 if (isinstance(picks, list) and len(picks) > 0) or \
                        (isinstance(picks, dict) and len(picks) > 0) else 1)
          "; then
            echo "already_done=true" >> $GITHUB_OUTPUT
            echo "Draft results already saved for $SEASON — skipping."
          else
            echo "already_done=false" >> $GITHUB_OUTPUT
            echo "No draft results yet for $SEASON — will attempt fetch."
          fi

      - name: Set up Python
        if: steps.check.outputs.already_done == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        if: steps.check.outputs.already_done == 'false'
        run: pip install -r requirements-ci.txt

      - name: Fetch draft picks from Yahoo
        if: steps.check.outputs.already_done == 'false'
        id: fetch
        env:
          YAHOO_CLIENT_ID:     ${{ secrets.YAHOO_CLIENT_ID }}
          YAHOO_CLIENT_SECRET: ${{ secrets.YAHOO_CLIENT_SECRET }}
          YAHOO_REFRESH_TOKEN: ${{ secrets.YAHOO_REFRESH_TOKEN }}
          YAHOO_LEAGUE_KEY:    ${{ secrets.YAHOO_LEAGUE_KEY }}
          PYTHONUTF8:          "1"
        run: |
          SEASON="${{ github.event.inputs.season || '2026' }}"
          python ci_runner.py --mode draft --season "$SEASON"

      - name: Generate draft recap article
        if: steps.check.outputs.already_done == 'false'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PYTHONUTF8:        "1"
        run: |
          SEASON="${{ github.event.inputs.season || '2026' }}"
          FORCE_ARG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_ARG="--force"
          fi
          python ci_runner.py --mode draft_recap --season "$SEASON" $FORCE_ARG

      - name: Commit & push results
        if: steps.check.outputs.already_done == 'false'
        run: |
          git config user.name  "BeerLeague Bot"
          git config user.email "beerleague-bot@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && echo "Nothing to commit." && exit 0
          git commit -m "feat: 2026 draft results + Bill Simmons recap [skip ci]"
          git pull --rebase -X ours https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git main
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
